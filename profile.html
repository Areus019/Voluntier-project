<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile — Voluntier</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <div class="nav">
    <a class="logo" href="index.html"><span class="logo-mark">V</span>Voluntier</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="opportunities.html">Opportunities</a>
      <a href="organizations.html">Organizations</a>
      <a href="events.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="forums.html">Forums</a>
    </nav>
    <button class="btn btn-outline" onclick="logout()">Log out</button>
  </div>
</header>

<section class="container">
  <div class="profile-header">
    <div class="avatar" id="p-initial">?</div>
    <div>
      <h1 id="p-name">Loading...</h1>
      <div class="meta" id="p-email"></div>
    </div>
  </div>

  <div class="grid" style="grid-template-columns: repeat(3,1fr); margin-top:20px;">
    <div class="card stat"><div class="num" id="p-points">0</div><div class="label">Contribution Points</div></div>
    <div class="card stat"><div class="num" id="p-count">0</div><div class="label">Missions Joined</div></div>
    <div class="card stat"><div class="num">3</div><div class="label">Friends</div></div>
  </div>

  <h2 class="section-title" style="margin-top:30px;">Recent Contributions</h2>
  <div id="p-contribs"></div>
</section>

<footer class="footer">
  © 2026 Voluntier · Small acts. Real change. <a href="about.html">About</a> · <a href="contact.html">Contact</a>

</html>
