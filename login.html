<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in — Voluntier</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <div class="nav">
    <a class="logo" href="index.html"><span class="logo-mark">V</span>Voluntier</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="opportunities.html">Opportunities</a>
      <a href="organizations.html">Organizations</a>
      <a href="events.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="forums.html">Forums</a>
    </nav>
    <a href="signup.html" class="btn">Sign up</a>
  </div>
</header>

<section class="container">
  <h1 class="section-title" style="text-align:center;">Welcome back</h1>
  <p class="section-sub" style="text-align:center;">Log in to continue volunteering.</p>

  <form class="form" onsubmit="login(event)">
    <label for="email">Email</label>
    <input id="email" type="email" required>
    <label for="password">Password</label>
    <input id="password" type="password" required>
    <button type="submit" class="btn">Log in</button>
    <p class="hint" style="text-align:center; margin-top:14px;">No account yet? <a href="signup.html">Sign up</a></p>
  </form>
</section>

<footer class="footer">© 2026 Voluntier</footer>
<script src="js/main.js"></script>
</body>
</html>
